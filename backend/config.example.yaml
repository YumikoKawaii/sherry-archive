server:
  port: "8080"

db:
  host: localhost
  port: "5432"
  user: postgres
  password: postgres
  db_name: sherry_archive
  ssl_mode: disable
  # Override with an absolute path when running outside the backend/ directory:
  # migrations_source: "file:///absolute/path/to/backend/migrations"
  migrations_source: "file://migrations"

jwt:
  access_secret: change-me-access-secret
  refresh_secret: change-me-refresh-secret
  access_token_expiry: 15m
  refresh_token_expiry: 168h

s3:
  region: ap-southeast-1
  bucket: sherry-archive
  presign_expiry: 1h
  # endpoint: http://localhost:9000  # uncomment for local MinIO dev
