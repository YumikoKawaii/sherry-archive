name: Run DB Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run migration task on ECS
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster sherry-archive \
            --task-definition sherry-archive-migration:1 \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-09056d199ab32fa30],securityGroups=[sg-0c28debeba2e64092],assignPublicIp=ENABLED}" \
            --query 'tasks[0].taskArn' \
            --output text \
            --region ap-southeast-1)

          aws ecs wait tasks-stopped \
            --cluster sherry-archive \
            --tasks $TASK_ARN \
            --region ap-southeast-1

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster sherry-archive \
            --tasks $TASK_ARN \
            --query 'tasks[0].containers[0].exitCode' \
            --output text \
            --region ap-southeast-1)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code $EXIT_CODE"
            exit 1
          fi
